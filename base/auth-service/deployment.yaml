apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: jobs-platform
  labels:
    app: auth-service
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/name: auth-service
    spec:
      initContainers:
        - name: create-database
          image: alpine:3.20
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              apk add --no-cache postgresql-client && \
              psql -h postgres.postgress.svc.cluster.local -U devops -d postgres -tc \
                "SELECT 1 FROM pg_database WHERE datname = 'auth'" | grep -q 1 || \
              psql -h postgres.postgress.svc.cluster.local -U devops -d postgres -c \
                "CREATE DATABASE auth"
      containers:
        - name: auth-service
          image: ghcr.io/pascariucosmin93/auth-service:2b31dc8e8dbf5609b639115a1998079b366c4519
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POSTGRES_HOST
              value: "postgres.postgress.svc.cluster.local"
            - name: POSTGRES_DB
              value: "auth"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
