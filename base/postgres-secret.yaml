# IMPORTANT: Do NOT commit real credentials.
# In production use SealedSecret (bitnami/sealed-secrets) or ExternalSecret (external-secrets-operator).
# To provision manually before first deploy:
#
#   kubectl create secret generic postgres-credentials \
#     --from-literal=POSTGRES_USER=jobplatform \
#     --from-literal=POSTGRES_PASSWORD=<strong-password> \
#     -n jobs-platform
#
# The YAML below is a placeholder kept for GitOps structure completeness.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: jobs-platform
type: Opaque
stringData:
  POSTGRES_USER: "jobplatform"
  POSTGRES_PASSWORD: "REPLACE_WITH_SEALED_OR_EXTERNAL_SECRET"
