apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-service
  namespace: jobs-platform
  labels:
    app: job-service
    app.kubernetes.io/name: job-service
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-service
  template:
    metadata:
      labels:
        app: job-service
        app.kubernetes.io/name: job-service
    spec:
      containers:
        - name: job-service
          image: ghcr.io/YOUR_GITHUB_USERNAME/job-service:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POSTGRES_HOST
              value: "postgres.postgres.svc.cluster.local"
            - name: POSTGRES_DB
              value: "jobs"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 12
            periodSeconds: 10
